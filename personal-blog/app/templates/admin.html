{% extends "base.html" %} {% block content %}
<div>
  <h1>Personal Blog</h1>
  <a href="{{ url_for('new') }}">+ Add</a>
</div>
{% for article in articles %}
<div>
  <p>
    <a href="{{ url_for('article', slug=article.slug) }}">{{ article.title }}</a>
    <a href="{{ url_for('edit', slug=article.slug) }}">Edit</a>
    <form method="post" action="{{ url_for('delete', slug=article.slug) }}">
        <button type="submit">Delete</button>
    </form>
  </p>
</div>
{% endfor %} {% endblock %}
